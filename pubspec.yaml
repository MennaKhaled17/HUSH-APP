name: hush
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  flutter_local_notifications: 18.0.1
  shared_preferences: ^2.0.0
  http: ^1.0.0
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0  # for API keys
  provider: ^6.1.5+1
  flutter_localizations:
    sdk: flutter
  geolocator: ^14.0.2
  timezone: 0.9.4
  
  flutter_foreground_task: ^8.0.0   # keeps service alive
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/azan.mp3
    - .env
    

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"